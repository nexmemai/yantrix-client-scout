# docker-compose.scraper.yml
# Runs gosom/google-maps-scraper in Web UI + REST API mode.
# Used standalone in dev, or as a sidecar in the full docker-compose.yml.
#
# Usage: docker compose -f scrapers/docker-compose.scraper.yml up -d
# API docs: http://localhost:8080/api/docs

services:
  gmaps-scraper:
    image: gosom/google-maps-scraper:latest
    container_name: gmaps-scraper
    restart: unless-stopped
    command:
      - "-data-folder"
      - "/gmapsdata"
    volumes:
      # Persistent storage for job data, results CSVs, and Playwright cache
      - gmaps_data:/gmapsdata
      - gmaps_playwright_cache:/opt
    ports:
      # Expose REST API + Web UI to the host (dev only — remove in prod, use internal network)
      - "8080:8080"
    environment:
      # Optional: tune concurrency (default 1, max recommended: 4 on A1 Flex)
      - SCRAPER_CONCURRENCY=${GMAPS_CONCURRENCY:-2}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/jobs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  gmaps_data:
    driver: local
  gmaps_playwright_cache:
    driver: local
