# Yantrix Client Scout production stack for one VM.
#
# The default stack runs API, dashboard, gmaps-scraper, redis, worker, and
# local Postgres. Optional services:
#   COMPOSE_PROFILES=n8n docker compose up -d
#   COMPOSE_PROFILES=scrapy docker compose up -d
#   COMPOSE_PROFILES=n8n,scrapy docker compose up -d
#
# Scale workers horizontally:
#   docker compose up -d --scale worker=3

name: ${COMPOSE_PROJECT_NAME:-yantrix-client-scout}

x-api-environment: &api-environment
  APP_NAME: ${APP_NAME:-Yantrix Client Scout API}
  APP_VERSION: ${APP_VERSION:-0.1.0}
  DEBUG: ${DEBUG:-false}
  API_HOST: 0.0.0.0
  API_PORT: 8000
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
  DB_HOST: ${DB_HOST:-db}
  DB_PORT: ${DB_PORT:-5432}
  DB_NAME: ${DB_NAME:-clientscout}
  DB_USER: ${DB_USER:-scout}
  DB_PASSWORD: ${DB_PASSWORD:-changeme}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  GMAPS_SCRAPER_URL: http://gmaps-scraper:8080
  LLM_PROVIDER: ${LLM_PROVIDER:-nvidia}
  LLM_API_KEY: ${LLM_API_KEY:-}
  LLM_MODEL_NAME: ${LLM_MODEL_NAME:-}
  LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-3}
  LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
  NVIDIA_NIM_API_KEY: ${NVIDIA_NIM_API_KEY:-}
  NVIDIA_NIM_BASE_URL: ${NVIDIA_NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
  NVIDIA_NIM_MODEL: ${NVIDIA_NIM_MODEL:-meta/llama-3.3-70b-instruct}
  PSI_API_KEY: ${PSI_API_KEY:-}
  HUBSPOT_ACCESS_TOKEN: ${HUBSPOT_ACCESS_TOKEN:-}
  ZOHO_CLIENT_ID: ${ZOHO_CLIENT_ID:-}
  ZOHO_CLIENT_SECRET: ${ZOHO_CLIENT_SECRET:-}
  ZOHO_REFRESH_TOKEN: ${ZOHO_REFRESH_TOKEN:-}
  AUDIT_CONCURRENCY: ${AUDIT_CONCURRENCY:-3}
  SCRAPER_CONCURRENCY: ${SCRAPER_CONCURRENCY:-2}
  WORKER_MAX_JOBS: ${WORKER_MAX_JOBS:-8}
  WORKER_JOB_TIMEOUT_SECONDS: ${WORKER_JOB_TIMEOUT_SECONDS:-1800}
  WORKER_HEARTBEAT_INTERVAL_SECONDS: ${WORKER_HEARTBEAT_INTERVAL_SECONDS:-15}
  WORKER_STALE_JOB_THRESHOLD_SECONDS: ${WORKER_STALE_JOB_THRESHOLD_SECONDS:-300}
  SNAPSHOT_BACKEND: ${SNAPSHOT_BACKEND:-local}
  SNAPSHOT_DIR: /app/snapshots
  JUSTDIAL_ENABLED: ${JUSTDIAL_ENABLED:-false}
  PLAYWRIGHT_BROWSERS_PATH: /home/scout/.cache/ms-playwright
  # Phase 4 - Autonomous Outreach. All defaults are dry-run safe; the
  # operator opts in by setting credentials and toggling per-run from
  # the dashboard.
  OUTREACH_DRY_RUN: ${OUTREACH_DRY_RUN:-true}
  OUTREACH_AUTOSEND_DEFAULT: ${OUTREACH_AUTOSEND_DEFAULT:-false}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USERNAME: ${SMTP_USERNAME:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
  SMTP_FROM: ${SMTP_FROM:-}
  SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-20}
  WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-meta_cloud}
  WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
  WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
  WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v20.0}
  WHATSAPP_TIMEOUT_SECONDS: ${WHATSAPP_TIMEOUT_SECONDS:-20}

services:
  api:
    build:
      context: ./client-scout-api
      dockerfile: Dockerfile
    image: ${API_IMAGE:-yantrix/client-scout-api:local}
    container_name: ${API_CONTAINER_NAME:-clientscout-api}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      <<: *api-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      gmaps-scraper:
        condition: service_started
    ports:
      - "${API_HOST_PORT:-127.0.0.1:8000}:8000"
    volumes:
      - api_snapshots:/app/snapshots
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - scout
    dns:
      - 127.0.0.11
    dns_search: []

  worker:
    build:
      context: ./client-scout-api
      dockerfile: Dockerfile
    image: ${API_IMAGE:-yantrix/client-scout-api:local}
    # No container_name: workers may scale > 1 replica, which forbids static names.
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      <<: *api-environment
      # Marks this process as a worker so app code can branch on role if needed.
      SERVICE_ROLE: worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      gmaps-scraper:
        condition: service_started
    volumes:
      - api_snapshots:/app/snapshots
    # ARQ replaces the API entrypoint. Override docker-entrypoint.sh's CMD.
    entrypoint: ["arq"]
    command: ["app.workers.arq_worker.WorkerSettings"]
    healthcheck:
      # ARQ writes a health key into Redis at health_check_interval. Reading it
      # tells us the worker is alive without needing an HTTP port.
      test:
        - "CMD-SHELL"
        - "python -c \"import os, redis, sys; r=redis.Redis.from_url(os.environ['REDIS_URL']); k=r.keys('arq:health-check*'); sys.exit(0 if k else 1)\""
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - scout
    dns:
      - 127.0.0.11
    dns_search: []

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: ${REDIS_CONTAINER_NAME:-clientscout-redis}
    restart: unless-stopped
    # AOF for durability of queued jobs across restarts; bounded memory so a
    # runaway producer cannot OOM the host. noeviction protects unprocessed
    # jobs from being silently dropped under pressure.
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--maxmemory"
      - "${REDIS_MAXMEMORY:-256mb}"
      - "--maxmemory-policy"
      - "noeviction"
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_HOST_PORT:-127.0.0.1:6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - scout

  dashboard:
    build:
      context: ./client-scout-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    image: ${DASHBOARD_IMAGE:-yantrix/client-scout-dashboard:local}
    container_name: ${DASHBOARD_CONTAINER_NAME:-clientscout-dashboard}
    restart: unless-stopped
    environment:
      NGINX_PORT: ${DASHBOARD_CONTAINER_PORT:-8080}
    ports:
      - "3000:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- \"http://127.0.0.1:$${NGINX_PORT:-8080}/health\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - scout

  gmaps-scraper:
    image: ${GMAPS_IMAGE:-gosom/google-maps-scraper:latest}
    container_name: ${GMAPS_CONTAINER_NAME:-gmaps-scraper}
    restart: unless-stopped
    command:
      - "-data-folder"
      - "/gmapsdata"
    environment:
      SCRAPER_CONCURRENCY: ${GMAPS_CONCURRENCY:-2}
    volumes:
      - gmaps_data:/gmapsdata
      - gmaps_playwright_cache:/opt
    expose:
      - "8080"
    ports:
      - "${GMAPS_HOST_PORT:-127.0.0.1:8080}:8080"
    networks:
      - scout

  scrapy-worker:
    image: ${SCRAPY_WORKER_IMAGE:-yantrix/client-scout-scrapy:latest}
    container_name: ${SCRAPY_WORKER_CONTAINER_NAME:-clientscout-scrapy-worker}
    restart: unless-stopped
    profiles:
      - scrapy
    env_file:
      - ./.env
    environment:
      SCRAPY_PROJECT: ${SCRAPY_PROJECT:-client_scout_scrapers}
      SCRAPY_SPIDER: ${SCRAPY_SPIDER:-justdial}
      SCRAPY_LOG_LEVEL: ${SCRAPY_LOG_LEVEL:-INFO}
      SCRAPER_CONCURRENCY: ${SCRAPER_CONCURRENCY:-2}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-clientscout}
      DB_USER: ${DB_USER:-scout}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
    command: ["sh", "-c", "${SCRAPY_WORKER_COMMAND:-scrapy crawl justdial}"]
    networks:
      - scout

  n8n:
    image: ${N8N_IMAGE:-n8nio/n8n:latest}
    container_name: ${N8N_CONTAINER_NAME:-clientscout-n8n}
    restart: unless-stopped
    profiles:
      - n8n
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-me-before-production}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Kolkata}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - scout

  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-clientscout-db}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-clientscout}
      POSTGRES_USER: ${DB_USER:-scout}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./client-scout-api/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_HOST_PORT:-127.0.0.1:5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-scout} -d ${DB_NAME:-clientscout}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scout

networks:
  scout:
    driver: bridge

volumes:
  api_snapshots:
    driver: local
  gmaps_data:
    driver: local
  gmaps_playwright_cache:
    driver: local
  n8n_data:
    driver: local
  pgdata:
    driver: local
  redis_data:
    driver: local
